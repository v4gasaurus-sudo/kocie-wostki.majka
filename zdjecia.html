<!DOCTYPE html>
<html lang="pl">
<head>

<head>
<meta charset="UTF-8">
<title>Galeria kotów 🐱</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ed7db7;
    text-align: center;
}

h1 {
    margin: 20px 0;
}

/* GALERIA */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* PRZYCISKI */
.nav {
    position: absolute;
    top: 50%;
    font-size: 50px;
    color: white;
    cursor: pointer;
    user-select: none;
    padding: 10px;
}

.prev { left: 20px; }
.next { right: 20px; }

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🐱 Galeria kotów</h1>
    <p>Zdjęcia kotów są zrobione przeze mnie, z czego w większości są moje, nazywają się Marcepan i Momo.</p>
       </p>Dziękuję też przyjacielowi za pozwolenie na użycie zdjęć jego kotów, Gucia, Majki i Mony, która jest honorowym,
       pięćdziesiątym zdjęciem.</p>
    

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">✖</span>
    <span class="nav prev" onclick="changeImage(-1)">❮</span>
    <img id="lightbox-img">
    <span class="nav next" onclick="changeImage(1)">❯</span>
</div>

<script>
const images = [
    "kot1.jpg","kot2.jpg","kot3.jpg","kot4.jpg","kot5.jpg",
  "kot6.jpg","kot7.jpg","kot8.jpg","kot9.jpg","kot10.jpg",
  "kot11.jpg","kot12.jpg","kot13.jpg","kot14.jpg","kot15.jpg",
  "kot16.jpg","kot17.jpg","kot18.jpg","kot19.jpg","kot20.jpg",
  "kot21.jpg","kot22.jpg","kot23.jpg","kot24.jpg","kot25.jpg",
  "kot26.jpg","kot27.jpg","kot28.jpg","kot29.jpg","kot30.jpg",
  "kot31.jpg","kot32.jpg","kot33.jpg","kot34.jpg","kot35.jpg",
  "kot36.jpg","kot37.jpg","kot38.jpg","kot39.jpg","kot40.jpg",
  "kot41.jpg","kot42.jpg","kot43.jpg","kot44.jpg","kot45.jpg",
  "kot46.jpg","kot47.jpg","kot48.jpg","kot49.jpg","kot50.jpg",
]
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
let currentIndex = 0;

/* TWORZENIE MINIATUREK */
images.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => openLightbox(index);
    gallery.appendChild(img);
});

/* OTWARCIE */
function openLightbox(index) {
    currentIndex = index;
    lightbox.style.display = "flex";
    lightboxImg.src = images[currentIndex];
}

/* ZAMKNIĘCIE */
function closeLightbox() {
    lightbox.style.display = "none";
}

/* PRZEWIJANIE */
function changeImage(step) {
    currentIndex += step;

    if (currentIndex < 0) currentIndex = images.length - 1;
    if (currentIndex >= images.length) currentIndex = 0;

    lightboxImg.src = images[currentIndex];
}

/* KLAWISZE */
document.addEventListener("keydown", e => {
    if (lightbox.style.display === "flex") {
        if (e.key === "ArrowRight") changeImage(1);
        if (e.key === "ArrowLeft") changeImage(-1);
        if (e.key === "Escape") closeLightbox();
    }
});
</script>

    <a href="index.html">← Powrót na stronę główną</a>
</body>
</html>
