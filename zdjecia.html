<!DOCTYPE html>
<html lang="pl">
<head>

<head>
<meta charset="UTF-8">
<title>Galeria kotów 🐱</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ed7db7;
    text-align: center;
}

h1 {
    margin: 20px 0;
}

/* GALERIA */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.2s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* PRZYCISKI */
.nav {
    position: absolute;
    top: 50%;
    font-size: 50px;
    color: white;
    cursor: pointer;
    user-select: none;
    padding: 10px;
}

.prev { left: 20px; }
.next { right: 20px; }

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 40px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🐱 Galeria kotów</h1>
    <p>Zdjęcia kotów są zrobione przeze mnie, z czego w większości są moje, nazywają się Marcepan i Momo.</p>
       </p>Dziękuję też przyjacielowi za pozwolenie na użycie zdjęć jego kotów, Gucia, Majki i Mony, która jest honorowym,
       pięćdziesiątym zdjęciem.</p>
    

<div class="gallery" id="gallery"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">✖</span>
    <span class="nav prev" onclick="changeImage(-1)">❮</span>
    <img id="lightbox-img">
    <span class="nav next" onclick="changeImage(1)">❯</span>
</div>

<script>
const images = [
    "kot1.jpg","img/kot2.jpg","img/kot3.jpg","img/kot4.jpg","img/kot5.jpg",
  "img/kot6.jpg","img/kot7.jpg","img/kot8.jpg","img/kot9.jpg","img/kot10.jpg",
  "img/kot11.jpg","img/kot12.jpg","img/kot13.jpg","img/kot14.jpg","img/kot15.jpg",
  "img/kot16.jpg","img/kot17.jpg","img/kot18.jpg","img/kot19.jpg","img/kot20.jpg",
  "img/kot21.jpg","img/kot22.jpg","img/kot23.jpg","img/kot24.jpg","img/kot25.jpg",
  "img/kot26.jpg","img/kot27.jpg","img/kot28.jpg","img/kot29.jpg","img/kot30.jpg",
  "img/kot31.jpg","img/kot32.jpg","img/kot33.jpg","img/kot34.jpg","img/kot35.jpg",
  "img/kot36.jpg","img/kot37.jpg","img/kot38.jpg","img/kot39.jpg","img/kot40.jpg",
  "img/kot41.jpg","img/kot42.jpg","img/kot43.jpg","img/kot44.jpg","img/kot45.jpg",
  "img/kot46.jpg","img/kot47.jpg","img/kot48.jpg","img/kot49.jpg","img/kot50.jpg",
]
const gallery = document.getElementById("gallery");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
let currentIndex = 0;

/* TWORZENIE MINIATUREK */
images.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => openLightbox(index);
    gallery.appendChild(img);
});

/* OTWARCIE */
function openLightbox(index) {
    currentIndex = index;
    lightbox.style.display = "flex";
    lightboxImg.src = images[currentIndex];
}

/* ZAMKNIĘCIE */
function closeLightbox() {
    lightbox.style.display = "none";
}

/* PRZEWIJANIE */
function changeImage(step) {
    currentIndex += step;

    if (currentIndex < 0) currentIndex = images.length - 1;
    if (currentIndex >= images.length) currentIndex = 0;

    lightboxImg.src = images[currentIndex];
}

/* KLAWISZE */
document.addEventListener("keydown", e => {
    if (lightbox.style.display === "flex") {
        if (e.key === "ArrowRight") changeImage(1);
        if (e.key === "ArrowLeft") changeImage(-1);
        if (e.key === "Escape") closeLightbox();
    }
});
</script>

    <a href="index.html">← Powrót na stronę główną</a>
</body>
</html>
